{{define "body"}}
<div class="col-sm-9 col-sm-offset-3 col-md-10 col-md-offset-2 main">
    <h1 class="page-header">
        Dashboard
    </h1>
    <div id="loading">
        <i class="fa fa-spinner fa-spin fa-4x"></i>
    </div>
    {{template "flashes" .Flashes}}
    <div id="emptyMessage" style="display:none;">
        <div class="alert alert-info">
            No campaigns created yet. Let's create one!
        </div>
    </div>
    <div id="dashboard" style="display:none;">
        <div class="row dashboard-controls">
            <div class="col-sm-8">
                <div class="btn-group" role="group" aria-label="Campaign result views">
                    <button type="button" class="btn btn-primary dashboard-view-btn active" id="viewAll" data-view="all">All Campaigns</button>
                    <button type="button" class="btn btn-default dashboard-view-btn" id="viewOngoing" data-view="ongoing">Ongoing</button>
                    <button type="button" class="btn btn-default dashboard-view-btn" id="viewCompleted" data-view="completed">Completed</button>
                </div>
            </div>
            <div class="col-sm-4 text-right dashboard-counts">
                <span class="label label-default">All: <span id="countAll">0</span></span>
                <span class="label label-info">Ongoing: <span id="countOngoing">0</span></span>
                <span class="label label-success">Completed: <span id="countCompleted">0</span></span>
            </div>
        </div>
        <br />
        <div class="row">
            <div class="col-xs-12">
                <div class="pc-card">
                    <div id="overview_chart" style="height:240px;"></div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-xs-12">
                <div class="pc-stats-grid">
                    <div class="pc-stat-card"><div id="sent_chart" style="height:180px;"></div></div>
                    <div class="pc-stat-card"><div id="opened_chart" style="height:180px;"></div></div>
                    <div class="pc-stat-card"><div id="clicked_chart" style="height:180px;"></div></div>
                    <div class="pc-stat-card"><div id="submitted_data_chart" style="height:180px;"></div></div>
                    <div class="pc-stat-card"><div id="email_reported_chart" style="height:180px;"></div></div>
                </div>
            </div>
        </div>
        <div class="row">
            <h2 id="campaignSectionTitle">Recent Campaigns</h2>
        </div>
        <div class="row">
            <a href="/campaigns">
                <button type="button" class="btn btn-primary">View All</button>
            </a>
        </div>
        &nbsp;&nbsp;
        <div class="row">
            <div class="col-xs-12">
                <div class="pc-card">
                    <table id="campaignTable" class="table">
                        <thead>
                            <tr>
                                <th class="col-md-2 col-sm-2">Name</th>
                                <th class="col-md-2 col-sm-2">Created Date</th>
                                <th class="col-md-1 col-sm-1">
                                    <i class="fa fa-envelope-o"></i>
                                </th>
                                <th class="col-md-1 col-sm-1">
                                    <i class="fa fa-envelope-open-o"></i>
                                </th>
                                <th class="col-md-1 col-sm-1">
                                    <i class="fa fa-mouse-pointer"></i>
                                </th>
                                <th class="col-md-1 col-sm-1">
                                    <i class="fa fa-exclamation-circle"></i>
                                </th>
                                <th class="col-md-1 col-sm-1">
                                    <i class="fa fa-bullhorn"></i>
                                </th>
                                <th class="col-md-1 col-sm-1">Status</th>
                                <th class="col-md-2 col-sm-2 no-sort"></th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}} {{define "scripts"}}
<script src="/js/src/app/dashboard.js"></script>
{{end}}
